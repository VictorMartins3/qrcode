<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado de Treinamento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ===== TOOLBAR (hidden on print) ===== */
        .toolbar {
            background: #fff;
            padding: 12px 20px;
            text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .toolbar .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .btn-print { background: #0f4c81; color: #fff; }
        .btn-back { background: #e5e7eb; color: #374151; text-decoration: none; display: inline-block; }

        /* ===== CERTIFICATE ===== */
        .cert-wrapper {
            display: flex;
            justify-content: center;
            padding: 32px 16px;
        }

        .certificate {
            width: 297mm;
            min-height: 210mm;
            background: #fff;
            position: relative;
            padding: 20mm;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        /* Borda decorativa */
        .certificate::before {
            content: "";
            position: absolute;
            top: 8mm;
            left: 8mm;
            right: 8mm;
            bottom: 8mm;
            border: 2px solid #0f4c81;
            border-radius: 4px;
            pointer-events: none;
        }

        .certificate::after {
            content: "";
            position: absolute;
            top: 10mm;
            left: 10mm;
            right: 10mm;
            bottom: 10mm;
            border: 1px solid #c9a84c;
            border-radius: 2px;
            pointer-events: none;
        }

        .cert-content {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 170mm;
        }

        .cert-header {
            margin-bottom: 8mm;
        }

        .cert-org {
            font-size: 14px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin-bottom: 6mm;
        }

        .cert-title {
            font-size: 36px;
            color: #0f4c81;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 2mm;
        }

        .cert-subtitle {
            font-size: 16px;
            color: #c9a84c;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .cert-divider {
            width: 60mm;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
            margin: 6mm 0;
        }

        .cert-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cert-text {
            font-size: 15px;
            color: #555;
            margin-bottom: 4mm;
        }

        .cert-name {
            font-size: 32px;
            color: #1a1a2e;
            font-weight: 700;
            border-bottom: 2px solid #c9a84c;
            padding-bottom: 3mm;
            margin-bottom: 6mm;
            min-width: 120mm;
        }

        .cert-training-title {
            font-size: 20px;
            color: #0f4c81;
            font-weight: 700;
            margin-bottom: 4mm;
        }

        .cert-details {
            font-size: 14px;
            color: #666;
            line-height: 2;
            margin-bottom: 6mm;
        }

        .cert-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            margin-top: auto;
        }

        .cert-qr {
            text-align: center;
        }

        .cert-qr canvas {
            display: block;
        }

        .cert-qr-label {
            font-size: 9px;
            color: #aaa;
            margin-top: 2mm;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .cert-signature {
            text-align: center;
            min-width: 60mm;
        }

        .cert-signature-line {
            width: 60mm;
            height: 1px;
            background: #333;
            margin-bottom: 2mm;
        }

        .cert-signature-name {
            font-size: 13px;
            color: #333;
            font-weight: 600;
        }

        .cert-signature-role {
            font-size: 11px;
            color: #888;
        }

        .cert-id {
            text-align: right;
        }

        .cert-id-text {
            font-size: 10px;
            color: #bbb;
            font-family: 'Courier New', monospace;
        }

        /* ===== LOADING / ERROR ===== */
        .loading-container, .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .error-container {
            flex-direction: column;
            color: #888;
        }

        .error-container h2 { font-size: 20px; color: #333; margin-bottom: 8px; }

        .spinner {
            width: 32px;
            height: 32px;
            border: 4px solid #e0e0e0;
            border-top-color: #0f4c81;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== PRINT ===== */
        @media print {
            body { background: #fff; }
            .toolbar { display: none !important; }
            .cert-wrapper { padding: 0; }
            .certificate {
                box-shadow: none;
                width: 100%;
                min-height: 100vh;
                page-break-after: always;
            }

            @page {
                size: A4 landscape;
                margin: 0;
            }
        }

        @media (max-width: 900px) {
            .certificate {
                width: 100%;
                min-height: auto;
                padding: 12mm;
            }

            .cert-title { font-size: 24px; }
            .cert-name { font-size: 22px; min-width: auto; }
            .cert-footer { flex-direction: column; gap: 16px; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="toolbar" id="toolbar" style="display:none">
        <a class="btn btn-back" onclick="history.back()">&#8592; Voltar</a>
        <button class="btn btn-print" onclick="window.print()">Imprimir / Salvar PDF</button>
    </div>

    <div id="loadingState" class="loading-container">
        <div class="spinner"></div>
    </div>

    <div id="errorState" class="error-container" style="display:none">
        <h2>Certificado nao encontrado</h2>
        <p>Este certificado nao existe ou foi removido.</p>
    </div>

    <div class="cert-wrapper" id="certWrapper" style="display:none">
        <div class="certificate">
            <div class="cert-content">
                <div class="cert-header">
                    <div class="cert-org" id="certOrg"></div>
                    <div class="cert-title">Certificado</div>
                    <div class="cert-subtitle">de Conclusao</div>
                </div>

                <div class="cert-divider"></div>

                <div class="cert-body">
                    <div class="cert-text">Certificamos que</div>
                    <div class="cert-name" id="certName"></div>
                    <div class="cert-text">concluiu com aproveitamento o treinamento</div>
                    <div class="cert-training-title" id="certTraining"></div>
                    <div class="cert-details" id="certDetails"></div>
                </div>

                <div class="cert-footer">
                    <div class="cert-qr">
                        <canvas id="qrCanvas"></canvas>
                        <div class="cert-qr-label">Escaneie para verificar</div>
                    </div>

                    <div class="cert-signature">
                        <div class="cert-signature-line"></div>
                        <div class="cert-signature-name" id="certInstructor"></div>
                        <div class="cert-signature-role">Instrutor(a)</div>
                    </div>

                    <div class="cert-id">
                        <div class="cert-id-text" id="certIdText"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        async function init() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get("id");

            if (!id) { showError(); return; }

            try {
                var certDoc = await db.collection("certificates").doc(id).get();
                if (!certDoc.exists) { showError(); return; }

                var cert = certDoc.data();
                var trainingDoc = await db.collection("trainings").doc(cert.trainingId).get();
                if (!trainingDoc.exists) { showError(); return; }

                var training = trainingDoc.data();
                renderCertificate(id, cert, training);

            } catch (e) {
                console.error(e);
                showError();
            }
        }

        function renderCertificate(id, cert, training) {
            document.getElementById("certOrg").textContent = "";
            document.getElementById("certName").textContent = cert.studentName;
            document.getElementById("certTraining").textContent = training.title;

            var details = [];
            if (training.date) details.push("Data: " + formatDate(training.date));
            if (training.duration) details.push("Carga Horaria: " + training.duration);
            if (training.location) details.push("Local: " + training.location);
            document.getElementById("certDetails").textContent = details.join("  |  ");

            document.getElementById("certInstructor").textContent = training.instructor || "";
            document.getElementById("certIdText").textContent = "ID: " + id.substring(0, 8).toUpperCase();

            // QR Code apontando para verificar.html
            var verifyUrl = SITE_URL + "/verificar.html?id=" + id;
            QRCode.toCanvas(document.getElementById("qrCanvas"), verifyUrl, {
                width: 100,
                margin: 1,
                color: { dark: "#0f4c81" }
            });

            document.getElementById("loadingState").style.display = "none";
            document.getElementById("certWrapper").style.display = "flex";
            document.getElementById("toolbar").style.display = "flex";

            document.title = "Certificado - " + cert.studentName;
        }

        function showError() {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("errorState").style.display = "flex";
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            var parts = dateStr.split("-");
            if (parts.length === 3) return parts[2] + "/" + parts[1] + "/" + parts[0];
            return dateStr;
        }

        init();
    </script>
</body>
</html>
