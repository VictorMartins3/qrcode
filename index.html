<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamentos - SegureCare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f4c81, #16a085);
            color: #fff;
            text-align: center;
            padding: 48px 20px 40px;
        }

        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .header p { font-size: 15px; opacity: 0.85; }

        .search-box {
            max-width: 480px;
            margin: -28px auto 0;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .search-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 24px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input:focus { border-color: #0f4c81; }

        .input-group input::placeholder { color: #aaa; text-transform: none; letter-spacing: normal; }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #0f4c81, #16a085);
            color: #fff;
        }

        .content {
            max-width: 480px;
            margin: 24px auto;
            padding: 0 20px;
        }

        .message {
            text-align: center;
            padding: 32px 16px;
            color: #888;
            font-size: 14px;
        }

        .message.error { color: #e74c3c; }

        .company-header {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .company-header h2 {
            font-size: 20px;
            color: #0f4c81;
            margin-bottom: 4px;
        }

        .company-header p {
            font-size: 13px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 32px 20px;
            font-size: 13px;
            color: #aaa;
        }

        .footer a { color: #0f4c81; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #0f4c81;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .input-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Treinamentos</h1>
        <p>Digite o codigo da empresa para ver os treinamentos</p>
    </div>

    <div class="search-box">
        <div class="search-card">
            <div class="input-group">
                <input type="text" id="codeInput" placeholder="Codigo da empresa" autocomplete="off">
                <button class="btn btn-primary" id="btnSearch" onclick="searchByCode()">Buscar</button>
            </div>
        </div>
    </div>

    <div class="content" id="results"></div>

    <div class="footer">
        <a href="admin.html">Area Administrativa</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        // Checar se veio com codigo na URL (via QR code)
        var params = new URLSearchParams(window.location.search);
        var urlCode = params.get("code");
        if (urlCode) {
            document.getElementById("codeInput").value = urlCode.toUpperCase();
            searchByCode();
        }

        document.getElementById("codeInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchByCode();
        });

        async function searchByCode() {
            var code = document.getElementById("codeInput").value.trim().toUpperCase();
            var results = document.getElementById("results");
            var btn = document.getElementById("btnSearch");

            if (!code) {
                results.innerHTML = '<div class="message error">Digite o codigo da empresa</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = "";
            btn.innerHTML = '<span class="spinner"></span>';
            results.innerHTML = "";

            try {
                // Buscar empresa pelo codigo
                var companySnap = await db.collection("companies")
                    .where("code", "==", code)
                    .limit(1)
                    .get();

                if (companySnap.empty) {
                    results.innerHTML = '<div class="message error">Codigo nao encontrado. Verifique o codigo e tente novamente.</div>';
                    return;
                }

                var company = companySnap.docs[0].data();

                if (company.driveUrl) {
                    // Redirecionar para o Drive da empresa
                    results.innerHTML = '<div class="company-header">' +
                        '<h2>' + escHtml(company.name) + '</h2>' +
                        '<p>Redirecionando para os treinamentos...</p>' +
                    '</div>';
                    window.location.href = company.driveUrl;
                } else {
                    results.innerHTML = '<div class="message error">Esta empresa ainda nao tem um link de treinamentos configurado.</div>';
                }

            } catch (e) {
                console.error(e);
                results.innerHTML = '<div class="message error">Erro ao buscar. Tente novamente.</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = "Buscar";
            }
        }

        function escHtml(s) {
            var d = document.createElement("div");
            d.textContent = s || "";
            return d.innerHTML;
        }

        function escAttr(s) {
            return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
